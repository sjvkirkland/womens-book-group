# project information

site_name: SJV Kirkland women's book group
site_author: Angela Bartz
site_url: https://sjvkirkland.github.io/womens-book-group/

# Copyright
copyright: Copyright &copy 2026 SJV Kirkland women's book group

# Add extensions for Markdown processing, including support for attributes, Markdown in HTML, and admonitions.
markdown_extensions:
  - attr_list
  - md_in_html
  - admonition

# Configuration
theme: 
  name: material
  logo: images/logo.png
  favicon: images/favicon.png

  # Auto-expand the left navigation and include previous and next navigation in the footer.
  features: 
    - navigation.expand
    - navigation.footer
  
  # Set the color palette for light and dark mode, and include a toggle to switch between them.
  palette:
    
    # Palette toggle for light mode
    - scheme: default
      primary: brown
      toggle:
        icon: material/lightbulb 
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode

# Extra CSS
extra_css:
  - stylesheets/extra.css

# Site navigation
nav: 
  - Welcome: index.md
  - Previous books: previous-books.md
